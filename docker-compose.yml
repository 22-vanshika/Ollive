services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ollive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ollive"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ollive
      GROQ_API_KEY: ${GROQ_API_KEY}
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      CORS_ORIGINS: '["http://localhost:5173"]'
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
