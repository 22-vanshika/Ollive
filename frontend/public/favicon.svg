<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <!-- Definition of gradients for premium glassmorphism/gradient effect -->
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C96F53" />
      <stop offset="100%" stop-color="#E28F75" />
    </linearGradient>
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8FA89B" />
      <stop offset="100%" stop-color="#A5C0B2" />
    </linearGradient>
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#544941" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Outer background circle matching the warm unbleached linen theme -->
  <circle cx="64" cy="64" r="60" fill="#FAF6F0" stroke="#EAE4D9" stroke-width="1.5" filter="url(#subtle-shadow)" />

  <!-- A stylized 'O' for Ollive, which also forms an elegant organic chat bubble -->
  <path d="M 64,28 
           A 32,32 0 0 1 96,60 
           A 32,32 0 0 1 64,92 
           A 32,32 0 0 1 42,82 
           L 32,92 
           L 38,78 
           A 32,32 0 0 1 32,60 
           A 32,32 0 0 1 64,28 Z" 
        fill="none" 
        stroke="url(#brand-grad)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- A beautiful minimalist olive leaf springing out from the chat bubble, representing growth, peace, and AI intelligence -->
  <path d="M 64,60 
           C 64,44 76,36 84,36 
           C 84,52 72,60 64,60 Z" 
        fill="url(#leaf-grad)" />

  <path d="M 64,60 
           C 54,48 46,44 48,36 
           C 58,36 62,48 64,60 Z" 
        fill="url(#leaf-grad)" 
        opacity="0.85" />

  <!-- Stylized central olive dot (the spark of intelligence) -->
  <circle cx="64" cy="60" r="4.5" fill="#FAF6F0" />
</svg>